name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump when not re-running
        type: choice
        options: [patch, minor, major]
        default: patch
      skip_version_bump:
        description: Re-run only — publish current Version.props without bumping
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: smartgoldbergemu-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: windows-2025-vs2026
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      assembly_version: ${{ steps.meta.outputs.assembly_version }}
      package_base_name: ${{ steps.meta.outputs.package_base_name }}
      skip_bump: ${{ steps.meta.outputs.skip_bump }}
      commit_sha: ${{ steps.ref.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        shell: pwsh
        run: |
          git config user.name "delabarra"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      - name: Bump or read Version.props
        id: ver
        shell: pwsh
        run: |
          if ('${{ inputs.skip_version_bump }}' -eq 'true') {
            & ./.github/scripts/bump-version.ps1 -ReadOnly
          } else {
            & ./.github/scripts/bump-version.ps1 -Bump '${{ inputs.bump }}'
          }

      - name: Commit and push version bump
        if: inputs.skip_version_bump != true
        shell: pwsh
        run: |
          git add Version.props
          if ([string]::IsNullOrWhiteSpace((git status --porcelain Version.props))) {
            throw 'Version.props has no changes after bump.'
          }
          git commit -m "chore(release): bump version to ${{ steps.ver.outputs.version }} [automated]"
          git push origin HEAD:main

      - name: Set release metadata
        id: meta
        shell: pwsh
        run: |
          "version=${{ steps.ver.outputs.version }}" >> $env:GITHUB_OUTPUT
          "tag=${{ steps.ver.outputs.tag }}" >> $env:GITHUB_OUTPUT
          "assembly_version=${{ steps.ver.outputs.assembly_version }}" >> $env:GITHUB_OUTPUT
          "package_base_name=${{ steps.ver.outputs.package_base_name }}" >> $env:GITHUB_OUTPUT
          "skip_bump=${{ inputs.skip_version_bump }}" >> $env:GITHUB_OUTPUT

      - name: Record commit ref
        id: ref
        shell: pwsh
        run: echo "commit_sha=$(git rev-parse HEAD)" >> $env:GITHUB_OUTPUT

  build:
    runs-on: windows-2025-vs2026
    needs: prepare
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: |
            Tests/Tests.csproj
            SmartGoldbergEmu.LauncherUpdate/SmartGoldbergEmu.LauncherUpdate.csproj

      - name: Build Release
        shell: pwsh
        run: |
          $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.Component.MSBuild -find 'MSBuild\**\Bin\MSBuild.exe' | Select-Object -First 1
          if (-not $msbuild) { throw 'MSBuild not found.' }
          & $msbuild SmartGoldbergEmu.csproj /t:Rebuild /p:Configuration=Release /p:Platform=x64 /p:VersionSuffix= /p:VersionBuild=0 /m /v:m /nologo

      - name: Unit tests
        shell: pwsh
        run: dotnet test Tests\Tests.csproj -c Release -p:Platform=x64 -v minimal

      - name: Create CI test signing cert
        shell: pwsh
        run: |
          & ./.github/scripts/export-ci-codesign-cert.ps1

      - name: Package release zip
        shell: pwsh
        run: |
          & ./.github/scripts/package-release.ps1 -SkipBuild -PackageBaseName '${{ needs.prepare.outputs.package_base_name }}'

      - name: Verify Authenticode signature
        shell: pwsh
        run: |
          & ./.github/scripts/verify-release-signature.ps1

      - name: Verify build version
        shell: pwsh
        env:
          EXPECTED_FULL: ${{ needs.prepare.outputs.version }}
          EXPECTED_ASSEMBLY: ${{ needs.prepare.outputs.assembly_version }}
        run: |
          . ./.github/scripts/version-props.ps1
          $exe = 'bin\Release\SmartGoldbergEmu.exe'
          $asm = [System.Reflection.AssemblyName]::GetAssemblyName($exe).Version.ToString(3)
          if ($asm -ne $env:EXPECTED_ASSEMBLY) { throw "Assembly $asm != $env:EXPECTED_ASSEMBLY" }
          $product = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($exe).ProductVersion.Trim()
          if (-not (Test-ProductVersionMatchesRelease -ProductVersion $product -ReleaseVersion $env:EXPECTED_FULL)) {
            throw "ProductVersion '$product' != v$($env:EXPECTED_FULL)"
          }

      - uses: actions/upload-artifact@v7
        with:
          name: release-zip
          path: dist/${{ needs.prepare.outputs.package_base_name }}.zip

  publish:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@v7
        with:
          name: release-zip
          path: dist

      - name: Push tag
        shell: pwsh
        run: |
          git config user.name "delabarra"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          $tag = '${{ needs.prepare.outputs.tag }}'
          if ('${{ needs.prepare.outputs.skip_bump }}' -eq 'true') {
            git tag -fa $tag -m "Release $tag (re-run)"
            git push origin $tag --force
          } else {
            git tag -a $tag -m "Release $tag"
            git push origin $tag
          }

      - name: Format release notes
        id: notes
        shell: pwsh
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          & ./.github/scripts/format-release-notes.ps1 -Tag '${{ needs.prepare.outputs.tag }}'

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          files: dist/${{ needs.prepare.outputs.package_base_name }}.zip
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: false
          prerelease: false
